<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Valley of the Sun II — DM Suite</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
:root{--bg:#06080E;--bg1:#0A0D18;--bg2:#0E1220;--bg3:#131826;--bd:#192030;--bd2:#22304A;--bd3:#2E4060;--tr:#C4622D;--tr2:#E07840;--gd:#C99A2E;--gd2:#E0B840;--tl:#1A9090;--tl2:#22AEAE;--tx:#E0D5C0;--tx2:#9A8E78;--tx3:#5A5245;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100%;background:#06080E;}
body{color:var(--tx);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes veilPass{0%{opacity:0;transform:translateY(105%)}15%{opacity:.4}85%{opacity:.4}100%{opacity:0;transform:translateY(-105%)}}
@keyframes turnPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,98,45,0)}50%{box-shadow:0 0 0 3px rgba(196,98,45,.3)}}
@keyframes spin{to{transform:rotate(360deg)}}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;}
.veil{position:fixed;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(26,144,144,.35),rgba(201,154,46,.18),transparent);pointer-events:none;z-index:0;animation:veilPass var(--dur) ease-in-out infinite;animation-delay:var(--del);}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}
.geo{height:5px;opacity:.65;background:repeating-linear-gradient(90deg,var(--tr) 0,var(--tr) 8px,transparent 8px,transparent 12px,var(--gd) 12px,var(--gd) 16px,transparent 16px,transparent 24px,var(--tl) 24px,var(--tl) 28px,transparent 28px,transparent 36px);}
.hdr{padding:22px 20px 14px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(196,98,45,.07) 0%,transparent 100%);}
.sky-wrap{position:absolute;bottom:0;left:0;right:0;height:68px;opacity:.065;color:var(--tx);pointer-events:none;}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--tr);margin-bottom:4px;position:relative;z-index:1;}
.h-title{font-family:'Cinzel Decorative',serif;font-size:clamp(17px,5vw,32px);font-weight:700;background:linear-gradient(180deg,#F4E090 0%,#C99A2E 55%,#8A6810 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;position:relative;z-index:1;}
.h-sub{font-size:9px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--tx2);margin-top:4px;position:relative;z-index:1;}
.tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--bd2);background:var(--bg1);overflow-x:auto;flex-shrink:0;}
.tabs::-webkit-scrollbar{height:0;}
.tab{padding:9px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;position:relative;bottom:-1px;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--tx2);}.tab.on{color:var(--gd);border-bottom-color:var(--gd);}
.main{flex:1;padding:18px 20px 36px;background:var(--bg1);}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.sl{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);display:flex;align-items:center;gap:6px;}
.sl::before{content:'';display:inline-block;width:6px;height:6px;background:var(--tr);transform:rotate(45deg);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .12s;background:transparent;border-radius:2px;}
.bt{border-color:var(--tr);color:var(--tr);}.bt:hover{background:var(--tr);color:#fff;}
.bg2{border-color:var(--gd);color:var(--gd);}.bg2:hover{background:var(--gd);color:#000;}
.bl{border-color:var(--tl);color:var(--tl);}.bl:hover{background:var(--tl);color:#fff;}
.bx{border-color:var(--bd2);color:var(--tx2);padding:4px 8px;font-size:9px;}.bx:hover{border-color:var(--tx2);color:var(--tx);}
.bd2{border-color:#CC3A3A;color:#CC3A3A;}.bd2:hover{background:#CC3A3A;color:#fff;}
.bi{width:23px;height:23px;padding:0;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:2px;}
.btns-row{display:flex;gap:5px;flex-wrap:wrap;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.card{background:var(--bg2);border:1px solid var(--bd);padding:12px;position:relative;transition:border-color .15s;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));}
.card:hover{border-color:var(--bd2);}.card.dn{border-color:#7A1A1A;}
.cardt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cname{font-size:17px;font-weight:700;color:var(--tx);line-height:1;}
.cmeta{font-size:9px;color:var(--tx2);margin-top:2px;letter-spacing:.3px;}
.lvl{background:var(--bg3);border:1px solid var(--bd2);color:var(--gd);font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 6px;}
.hpr{margin-bottom:8px;}
.hpt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.hplbl{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);}
.hpn{font-size:12px;font-weight:700;color:var(--tx);}
.hpn .mx{font-size:9px;font-weight:400;color:var(--tx3);}
.hptrack{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.hpfill{height:100%;border-radius:2px;transition:width .3s,background .3s;}
.hpc{display:flex;gap:4px;align-items:center;}
.ain{width:40px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;text-align:center;padding:2px 3px;border-radius:2px;outline:none;}
.ain:focus{border-color:var(--tr);}
.sr{display:flex;gap:4px;margin-bottom:8px;}
.sc{display:flex;flex-direction:column;align-items:center;background:var(--bg3);border:1px solid var(--bd);padding:4px 8px;flex:1;}
.slbl{font-size:7px;font-weight:700;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-bottom:1px;}
.sv{font-size:14px;font-weight:700;color:var(--tx);line-height:1;}
.csec{margin-bottom:6px;}
.cslbl{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:4px;}
.chips{display:flex;flex-wrap:wrap;gap:2px;}
.chip{font-size:7px;font-weight:700;padding:2px 5px;border-radius:2px;border:1px solid var(--bd);color:var(--tx3);cursor:pointer;transition:all .1s;background:var(--bg3);}
.chip.ac{background:rgba(80,80,80,.15);}
.cpanel{background:var(--bg3);border:1px solid var(--bd2);padding:7px;margin-top:5px;display:flex;flex-wrap:wrap;gap:3px;}
.rssec{border-top:1px solid var(--bd);padding-top:6px;margin-top:6px;}
.rsrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.rsn{font-size:9px;color:var(--tx2);flex:1;}
.pips{display:flex;gap:2px;flex-wrap:wrap;}
.pip{width:10px;height:10px;border:1px solid var(--tl);transform:rotate(45deg);cursor:pointer;transition:background .1s;flex-shrink:0;}
.pip.on{background:var(--tl);}
.cfoot{display:flex;gap:3px;margin-top:8px;padding-top:7px;border-top:1px solid var(--bd);}
.addcard{border:1px dashed var(--bd2);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px;cursor:pointer;transition:all .15s;min-height:140px;color:var(--tx3);width:100%;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));}
.addcard:hover{border-color:var(--tr);color:var(--tr);}
.cbhdr{display:flex;align-items:center;flex-wrap:wrap;gap:9px;margin-bottom:16px;}
.rbox{background:var(--bg2);border:1px solid var(--bd2);padding:6px 13px;text-align:center;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.rlbl{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);}
.rnum{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--gd);line-height:1.1;}
.ilist{display:flex;flex-direction:column;gap:3px;}
.irow{display:grid;grid-template-columns:36px 1fr 130px 38px auto;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bd);padding:7px 9px;transition:all .15s;}
.irow.cur{border-color:var(--tr);background:rgba(196,98,45,.07);animation:turnPulse 2s ease-in-out infinite;}
.irow.dead{opacity:.28;filter:grayscale(1);}
.inum-wrap{text-align:center;}
.inum{font-family:'Cinzel Decorative',serif;font-size:15px;color:var(--gd);cursor:pointer;display:block;line-height:1;user-select:none;}
.irow.cur .inum{color:var(--tr2);}
.inum-in{width:34px;background:var(--bg3);border:1px solid var(--tr);color:var(--tr2);font-family:'Cinzel Decorative',serif;font-size:13px;text-align:center;padding:1px 2px;border-radius:2px;outline:none;}
.inb{min-width:0;}
.iname{font-size:13px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ibadge{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);}
.ibadge.pc{color:var(--tl2);}
.iconds{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.ichip{font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;}
.chp{display:flex;flex-direction:column;gap:2px;}
.chpbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.chpc{display:flex;align-items:center;gap:2px;}
.chpt{font-size:9px;font-weight:600;color:var(--tx2);white-space:nowrap;}
.chin{width:30px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;text-align:center;padding:2px;border-radius:2px;outline:none;}
.chin:focus{border-color:var(--tr);}
.cac{text-align:center;}
.cav{display:block;font-size:13px;font-weight:700;color:var(--tx);line-height:1;}
.cal{font-size:7px;color:var(--tx3);letter-spacing:1px;}
.cas{display:flex;gap:2px;}
.ipanel{background:var(--bg3);border:1px solid var(--bd2);padding:6px;margin-top:3px;display:flex;flex-wrap:wrap;gap:2px;}
.mbg{position:fixed;inset:0;background:rgba(6,8,14,.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);animation:fadeIn .12s ease;}
.modal{background:var(--bg2);border:1px solid var(--bd2);padding:18px;width:100%;max-width:440px;max-height:82vh;overflow-y:auto;animation:slideUp .15s ease;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));}
.mtitle{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gd);margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.fg1{grid-template-columns:1fr;}
.fgg{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);}
.fi{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:6px 7px;border-radius:2px;outline:none;width:100%;}
.fi:focus{border-color:var(--tr);}.fi::placeholder{color:var(--tx3);}
.fsel{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:6px 7px;border-radius:2px;outline:none;width:100%;cursor:pointer;}
.fta{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:12px;padding:7px;border-radius:2px;outline:none;width:100%;resize:vertical;min-height:70px;line-height:1.5;}
.fta:focus{border-color:var(--tr);}
.mfoot{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;padding-top:11px;border-top:1px solid var(--bd);}
.rer{display:flex;align-items:center;gap:5px;padding:4px 5px;background:var(--bg3);border:1px solid var(--bd);border-radius:2px;margin-bottom:3px;}
.npc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:11px;}
.npc-card{background:var(--bg2);border:1px solid var(--bd);padding:12px;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:border-color .15s;}
.npc-card:hover{border-color:var(--bd2);}
.npc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.npc-name{font-size:16px;font-weight:700;color:var(--tx);}
.nstat{display:inline-flex;align-items:center;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.nrel{font-size:9px;color:var(--tl2);margin-bottom:5px;font-style:italic;}
.nliner{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--bd);}
.nnotes-toggle{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);cursor:pointer;background:none;border:none;padding:0;font-family:'Barlow Condensed',sans-serif;}
.nnotes-toggle:hover{color:var(--tx2);}
.nnotes{font-size:10px;color:var(--tx2);line-height:1.6;margin-top:7px;white-space:pre-wrap;}
.map-container{border:1px solid var(--bd2);overflow:hidden;margin-bottom:16px;position:relative;height:300px;}
.map-label{position:absolute;top:8px;left:10px;z-index:1000;background:rgba(6,8,14,.8);padding:3px 8px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tr);}
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;}
.loc-card{background:var(--bg2);border:1px solid var(--bd);padding:11px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:border-color .15s;}
.loc-card:hover{border-color:var(--bd2);}
.loc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.loc-name{font-size:14px;font-weight:700;color:var(--tx);}
.lstat{display:inline-flex;align-items:center;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;}
.ldistrict{font-size:8px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.ldesc{font-size:10px;color:var(--tx2);line-height:1.5;}
.rg-list{display:flex;flex-direction:column;gap:8px;}
.rg-section{background:var(--bg2);border:1px solid var(--bd);overflow:hidden;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));}
.rg-header{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:var(--bg3);user-select:none;}
.rg-arrow{font-size:9px;color:var(--tx3);transition:transform .2s;flex-shrink:0;}
.rg-arrow.open{transform:rotate(90deg);}
.rg-title{flex:1;font-size:13px;font-weight:700;color:var(--gd);}
.rg-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--bd);}
.rr{display:flex;align-items:center;gap:8px;}
.rr-name{flex:1;font-size:11px;color:var(--tx);min-width:0;}
.rr-pips{display:flex;gap:3px;flex-wrap:wrap;align-items:center;}
.rpip{width:11px;height:11px;border:1px solid var(--gd);transform:rotate(45deg);cursor:pointer;transition:background .1s;flex-shrink:0;}
.rpip.on{background:var(--gd);}
.rg-foot{padding:0 12px 10px;display:flex;gap:5px;}
.notes-wrap{display:grid;grid-template-columns:190px 1fr;min-height:400px;border:1px solid var(--bd);overflow:hidden;}
.notes-sidebar{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;}
.notes-sidebar-hdr{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.notes-sidebar-title{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);}
.notes-list{flex:1;overflow-y:auto;}
.note-item{padding:9px 10px 9px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;font-size:11px;color:var(--tx2);border-left:2px solid transparent;}
.note-item:hover{background:var(--bg3);}.note-item.on{background:var(--bg3);color:var(--gd);border-left-color:var(--gd);}
.note-date{font-size:8px;color:var(--tx3);margin-top:1px;}
.notes-editor{display:flex;flex-direction:column;background:var(--bg1);}
.notes-editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--tx3);gap:8px;padding:20px;}
.note-title-bar{padding:9px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg2);}
.note-title-in{flex:1;background:transparent;border:none;color:var(--gd);font-family:'Cinzel Decorative',serif;font-size:13px;outline:none;min-width:0;}
.note-title-in::placeholder{color:var(--tx3);}
.note-ta{flex:1;background:transparent;border:none;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:13px;line-height:1.8;padding:16px 18px;resize:none;outline:none;min-height:300px;}
.note-ta::placeholder{color:var(--tx3);}
.note-footer{padding:6px 14px;border-top:1px solid var(--bd);font-size:8px;color:var(--tx3);letter-spacing:1px;background:var(--bg2);display:flex;justify-content:space-between;}
.empty{text-align:center;padding:36px 14px;color:var(--tx3);}
.ei{font-size:26px;opacity:.3;margin-bottom:8px;}
.et{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;}
.eb{font-size:10px;font-weight:300;max-width:230px;margin:0 auto 12px;line-height:1.5;}
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;}
.login-box{background:var(--bg2);border:1px solid var(--bd2);padding:28px 24px;width:100%;max-width:360px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));}
.login-title{font-family:'Cinzel Decorative',serif;font-size:22px;background:linear-gradient(180deg,#F4E090 0%,#C99A2E 55%,#8A6810 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-align:center;}
.login-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);text-align:center;margin-bottom:24px;}
.login-err{font-size:10px;color:#CC3A3A;text-align:center;margin-top:8px;min-height:16px;}
.spinner{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--gd);border-radius:50%;animation:spin 1s linear infinite;}
.sync{position:fixed;bottom:14px;right:14px;z-index:100;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);background:var(--bg2);border:1px solid var(--bd);padding:4px 9px;border-radius:2px;transition:all .3s;}
.sync.active{color:var(--tl2);border-color:var(--tl);}
.leaflet-tile-pane{filter:brightness(.95) saturate(.65) sepia(.15) hue-rotate(-5deg);}
.leaflet-container{background:#d4cfc8;}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#0E1220;border:1px solid #22304A;color:#E0D5C0;box-shadow:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
